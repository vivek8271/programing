<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>

<body>
    <h1>Job Application Form</h1>
    <form action="/submit-application" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required><br><br>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" required><br><br>

            <label for="resume">Upload Resume:</label>
            <input type="file" id="resume" name="resume" max-size="10MB" min-size="1MB" accept=".pdf,.doc,.docx"
                required><br><br>
        </fieldset>

        <fieldset>
            <legend>Work Experience</legend>
            <label for="experience">Previous Work Experience:</label>
            <br>
            <textarea id="experience" name="experience" rows="4" cols="50"></textarea><br><br>
        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="skills">Skills:</label>
            <select id="skills" name="skills">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="csharp">C#</option>
                <option value="ruby">Ruby</option>
                <option value="php">PHP</option>
            </select><br><br>
            <label for="additional">Share your additional information in words:</label><br>
            <textarea id="additional" name="additional" rows="4" cols="50"></textarea><br><br>
        </fieldset>
        <input type="submit" value="Submit Application">
    </form>
</body>

</html>
