<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <Link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Amazon Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        div :hover {
            border-color: white;
        }
    </style>

</head>

<body>
    <div style="display:flex; height: 50px; background-color: rgb(43, 44, 48);">
        <div height="100%" style="display: flex; align-items: center; margin-left: 0px;">
            <img src="https://th.bing.com/th/id/OIP.4sQ-nxdLA6-bkRMNpGYaSAHaEk?r=0&o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="Amazon Logo" style="width: 100px; margin: 0 auto; height: 100%;">

        </div>
        <div style="margin-left: 10px; color: white;">
            <!-- <i class="fa-thin fa-location-dot"></i> -->
            <!-- <i class="fa-sharp-duotone fa-thin fa-location-arrow"></i> -->
            <p>Delivering to vadodara
                <br>Update location
            </p>
        </div>
        <div style="margin-left: 20px; height: 100%; width: auto; display: flex; align-items: center;">
            <select style="width: 50px; height: 100%; background-color: whitesmoke;">
                <option value="all" selected>All</option>
                <option value="books">Books</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
                <option value="home">Home & Kitchen</option>
            </select>
            <input type="text" placeholder="Search Amazon"
                style="height: 85%; width: 400px; background-color: whitesmoke;">

        </div>
        <div
            style="background-color: whitesmoke; height: 100%; width: 60px; display: flex; align-items: center; justify-content: center;">
            <button
                style="background-color: rgb(209, 197, 127); height: 100%; width: 100%; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div
            style="padding-left:20px; padding-right: 20px; background-color: rgb(43, 44, 48); height: 100%; width: auto; display: flex; align-items: center; justify-content: center;">
            <p style="color: white;">India</p>
            <i class="fa-solid fa-angle-down" style="color:white"></i>
        </div>
        <div style="padding-left: 30px;">
            <p style="color: white;">Hello, John<br>Account & Lists</p>
            <i class="fa-solid fa-angle-down" style="color:white"></i>
        </div>
        <div style="padding-left: 30px;">
            <p style="color: white;">Returns<br>& Orders</p>
        </div>

        <div style="padding-left: 30px;">
            <i class="fa-solid fa-cart-shopping" style="color:white; font-size: 24px;"></i>
        </div>
    </div>
    
    <div></div>
</body>

</html>
